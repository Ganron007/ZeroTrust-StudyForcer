<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f4d03f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b7950b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shield background -->
  <path d="M50 5 
           L85 15 
           L85 45 
           Q85 75 50 95 
           Q15 75 15 45 
           L15 15 
           Z" 
        fill="url(#shieldGrad)" 
        stroke="url(#goldGrad)" 
        stroke-width="2.5"
        filter="url(#shadow)"/>

  <!-- Inner shield accent -->
  <path d="M50 12 
           L78 20 
           L78 45 
           Q78 70 50 86 
           Q22 70 22 45 
           L22 20 
           Z" 
        fill="none" 
        stroke="url(#goldGrad)" 
        stroke-width="1"
        opacity="0.6"/>

  <!-- Star at top -->
  <polygon points="50,22 52.5,29 60,29 54,33.5 56,41 50,36.5 44,41 46,33.5 40,29 47.5,29" 
           fill="url(#goldGrad)"/>

  <!-- CISSP text -->
  <text x="50" y="56" 
        text-anchor="middle" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="900" 
        font-size="14" 
        fill="url(#goldGrad)"
        letter-spacing="0.5">CISSP</text>

  <!-- Decorative line -->
  <line x1="28" y1="62" x2="72" y2="62" 
        stroke="url(#goldGrad)" 
        stroke-width="1.5" 
        opacity="0.8"/>

  <!-- ISC2 text -->
  <text x="50" y="72" 
        text-anchor="middle" 
        font-family="Arial, Helvetica, sans-serif" 
        font-weight="700" 
        font-size="8" 
        fill="#f4d03f"
        letter-spacing="1">ISC2</text>
</svg>